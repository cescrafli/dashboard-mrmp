<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Film Keren</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #14181c; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        h1 { color: #1DB954; font-weight: bold; }

        .card {
            background-color: #282828;
            border: none;
            transition: transform 0.3s ease;
            height: 100%; 
        }
        
        .card:hover {
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card-img-top {
            height: 380px;
            object-fit: cover; /* Agar gambar tidak gepeng */
        }

        .card-title { font-size: 1rem; font-weight: bold; color: white; }
        .card-text { color: #b3b3b3; font-size: 0.9rem; }
        .rating-badge { background-color: #1DB954; color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem;}

        /* Styling Kotak Pencarian */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px auto;
        }
        .form-control {
            background-color: #282828;
            border: 1px solid #444;
            color: white;
        }
        .form-control:focus {
            background-color: #282828;
            color: white;
            border-color: #1DB954;
            box-shadow: 0 0 0 0.25rem rgba(29, 185, 84, 0.25);
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <h1 class="text-center mb-4">🎬 Film Terpopuler & Pencarian</h1>

        <div class="search-container">
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Cari judul film (misal: Avengers)...">
                <button class="btn btn-success" type="button" onclick="searchMovies()">Cari</button>
            </div>
        </div>

        <div id="movie-gallery" class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4">
            </div>
    </div>

    <script>
        const gallery = document.getElementById('movie-gallery');
        const searchInput = document.getElementById('searchInput');

        // Fungsi utama untuk mengambil data dari Python
        async function fetchMovies(query = '') {
            // Tampilkan tulisan Loading saat menunggu
            gallery.innerHTML = '<div class="col-12 text-center text-muted">Sedang memuat data...</div>';

            try {
                // Tentukan URL: Apakah sedang mencari atau melihat yang populer?
                // Rute ini harus sesuai dengan yang ada di app.py (/api/movies)
                let url = '/api/movies';
                if (query) {
                    url += `?query=${encodeURIComponent(query)}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                // Bersihkan galeri sebelum menampilkan hasil baru
                gallery.innerHTML = '';

                if (data.error) {
                    gallery.innerHTML = `<div class="col-12 text-center text-danger">Error: ${data.error}</div>`;
                    return;
                }

                if (!data.results || data.results.length === 0) {
                    gallery.innerHTML = '<div class="col-12 text-center text-muted">Film tidak ditemukan. Coba kata kunci lain.</div>';
                    return;
                }

                // Loop data film
                data.results.forEach(movie => {
                    // Cek poster, kalau tidak ada pakai gambar abu-abu
                    const posterUrl = movie.poster_path 
                        ? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
                        : 'https://via.placeholder.com/500x750/282828/FFFFFF?text=No+Image';

                    // HTML untuk satu kartu film
                    const movieHTML = `
                        <div class="col">
                            <div class="card h-100">
                                <img src="${posterUrl}" class="card-img-top" alt="${movie.title}">
                                <div class="card-body">
                                    <h5 class="card-title text-truncate">${movie.title}</h5>
                                    <div class="d-flex justify-content-between align-items-center mt-2">
                                        <span class="rating-badge">★ ${movie.vote_average.toFixed(1)}</span>
                                        <small class="text-muted">${movie.release_date ? movie.release_date.split('-')[0] : '-'}</small>
                                    </div>
                                    <p class="card-text mt-2 small text-truncate">${movie.overview ? movie.overview : 'Tidak ada deskripsi.'}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    gallery.innerHTML += movieHTML;
                });

            } catch (error) {
                console.error('Error:', error);
                gallery.innerHTML = '<div class="col-12 text-center text-danger">Gagal menghubungi server.</div>';
            }
        }

        // Fungsi yang dipanggil saat tombol Cari ditekan
        function searchMovies() {
            const query = searchInput.value;
            fetchMovies(query);
        }

        // Fitur tambahan: Bisa tekan ENTER di keyboard untuk mencari
        searchInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                searchMovies();
            }
        });

        // Panggil fungsi ini saat halaman pertama kali dibuka (tanpa query = Populer)
        fetchMovies();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
