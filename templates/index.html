<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRMP - Movie Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #0a0a0a;
            --bg-surface-hover: #141414;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-white: #ffffff;
            --accent-black: #000000;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            margin: 0; padding: 0; line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
        
        /* Typography Header */
        header { text-align: center; margin-bottom: 56px; }
        h1 { margin: 0; font-weight: 700; font-size: 3.5rem; letter-spacing: -0.04em; color: var(--text-primary); }
        .subtitle { color: var(--text-secondary); font-size: 1.1rem; font-weight: 400; margin-top: 12px; letter-spacing: 0; }
        
        /* Sleek Search Bar */
        .search-container {
            display: flex; width: 100%; max-width: 560px; margin: 0 auto 64px auto;
            background: var(--bg-surface); border: 1px solid var(--border-light);
            border-radius: 16px; padding: 6px; transition: all 0.3s ease;
        }
        .search-container:focus-within { border-color: var(--border-focus); box-shadow: 0 0 0 4px rgba(255,255,255,0.05); }
        .search-container input {
            flex: 1; padding: 14px 20px; border: none; background: transparent;
            color: var(--text-primary); font-size: 1rem; outline: none; font-family: 'Inter', sans-serif;
        }
        .search-container input::placeholder { color: #52525b; }
        .search-container button {
            padding: 0 24px; border-radius: 12px; border: none;
            background: var(--accent-white); color: var(--accent-black); font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: transform 0.15s ease, opacity 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .search-container button:active { transform: scale(0.96); }
        .search-container button:hover { opacity: 0.9; }

        /* Chart Section */
        .chart-section {
            background: var(--bg-surface); border-radius: 24px; padding: 40px;
            border: 1px solid var(--border-light); display: none; margin-bottom: 64px;
        }
        .chart-section h2 { margin-top: 0; font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 10px; color: var(--text-primary);}
        .chart-container { width: 100%; height: 300px; display: flex; justify-content: center; margin-top: 24px;}

        /* Gallery Structure */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; border-bottom: 1px solid var(--border-light); padding-bottom: 16px;}
        .section-title { font-size: 1.25rem; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 10px;}
        .movie-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
        
        /* Premium Movie Cards */
        .movie-card { 
            position: relative; border-radius: 16px; overflow: hidden;
            background: var(--bg-surface); cursor: pointer; isolation: isolate;
            border: 1px solid rgba(255,255,255,0.03);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .movie-card:hover { transform: translateY(-6px); z-index: 10;}
        
        .card-image-wrap { position: relative; width: 100%; aspect-ratio: 2/3; overflow: hidden; }
        .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .movie-card:hover .card-image-wrap img { transform: scale(1.05); }

        /* Floating Rating Badge */
        .rating-badge {
            position: absolute; top: 12px; right: 12px; z-index: 2;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem; font-weight: 600; color: var(--text-primary);
            display: flex; align-items: center; gap: 4px;
        }

        /* Movie Title (Always Visible) */
        .movie-info { padding: 16px; background: var(--bg-surface); position: relative; z-index: 2;}
        .movie-info h3 { margin: 0; font-size: 0.95rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Hover Actions Overlay */
        .card-overlay {
            position: absolute; inset: 0; z-index: 3;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            display: flex; flex-direction: column; justify-content: center; padding: 20px; gap: 10px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .movie-card:hover .card-overlay { opacity: 1; }
        
        /* Action Buttons */
        .btn-action {
            display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
            padding: 12px; border-radius: 12px; border: 1px solid var(--border-light);
            background: rgba(24, 24, 27, 0.8); color: var(--text-primary); font-size: 0.85rem; font-weight: 500; 
            cursor: pointer; transition: all 0.2s;
        }
        .btn-action:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .btn-action.primary { background: var(--accent-white); color: var(--accent-black); border: none; font-weight: 600; }
        .btn-action.primary:hover { background: #e4e4e7; }

        /* Load More Button */
        .btn-load {
            padding: 14px 32px; font-size: 0.95rem; background: transparent; color: var(--text-primary);
            border: 1px solid var(--border-light); border-radius: 999px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-weight: 500;
        }
        .btn-load:hover { background: var(--bg-surface-hover); border-color: var(--border-focus); }

        /* Elegant Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center; z-index: 1000; 
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease; padding: 20px;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-base); border-radius: 24px; width: 100%; max-width: 720px; max-height: 85vh; overflow-y: auto;
            padding: 40px; position: relative; border: 1px solid var(--border-light);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 1);
            transform: scale(0.97) translateY(10px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        .modal-close {
            position: absolute; top: 24px; right: 24px; background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
        }
        .modal-close:hover { color: var(--text-primary); background: var(--bg-surface-hover); border-color: var(--border-focus);}
        #modal-title { margin: 0 0 24px 0; font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 10px; letter-spacing: -0.02em;}

        /* Minimal Loader */
        .loader {
            border: 2px solid var(--border-light); border-top-color: var(--accent-white);
            border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI Components inside Modal */
        .ai-summary-box { background: var(--bg-surface); border: 1px solid var(--border-light); padding: 24px; border-radius: 16px; margin: 24px 0; }
        .ai-summary-title { font-size: 1rem; color: var(--text-primary); font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 12px;}
        .ai-summary-text { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px;}
        
        .review-list { display: flex; flex-direction: column; gap: 16px; margin-top: 24px;}
        .review-item { padding: 20px; border-radius: 16px; border: 1px solid var(--border-light); background: transparent; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .review-author { font-weight: 600; color: var(--text-primary); font-size: 0.95rem;}
        .review-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 4px; font-weight: 500;}
        .review-badge.Positive { background: rgba(16, 185, 129, 0.1); color: #34d399; }
        .review-badge.Negative { background: rgba(239, 68, 68, 0.1); color: #f87171; }
        .review-content { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6; }

        /* QA Chat Box */
        .chat-input-wrapper { display: flex; gap: 8px; margin-top: 16px; }
        .chat-input-wrapper input { flex: 1; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-light); background: var(--bg-surface); color: var(--text-primary); outline: none; font-family: 'Inter', sans-serif;}
        .chat-input-wrapper input:focus { border-color: var(--border-focus); }
        .chat-input-wrapper button { padding: 0 20px; border-radius: 12px; background: var(--text-primary); color: var(--bg-base); border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s;}
        .chat-input-wrapper button:hover { opacity: 0.9; }

        .hidden { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MRMP</h1>
            <p class="subtitle">Reference Movie Recommendation Platform</p>
        </header>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for movies..." onkeypress="handleKeyPress(event)">
            <button onclick="searchMovies()">
                <i data-lucide="search" style="width: 16px; height: 16px;"></i>
            </button>
        </div>

        <div class="chart-section" id="chart-section">
            <h2><i data-lucide="bar-chart-3"></i> Global Popularity Metrics</h2>
            <div class="loader" id="chart-loader"></div>
            <div class="chart-container">
                <canvas id="ratingChart"></canvas>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title" id="gallery-title">
                <i data-lucide="zap"></i> Trending Now
            </h2>
        </div>
        
        <div class="loader hidden" id="gallery-loader"></div>
        <div class="movie-gallery" id="movie-gallery"></div>
        
        <div style="text-align: center; margin-top: 64px; margin-bottom: 32px;">
            <button id="load-more-btn" class="btn-load hidden" onclick="loadMore()">
                Load More
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i data-lucide="x" style="width: 18px; height: 18px;"></i></button>
            <h2 id="modal-title">Details</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/static/js/main.js" defer></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
