<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRMP Dashboard - Movie Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #09090b; /* Zinc 950 */
            --bg-card: #18181b; /* Zinc 900 */
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #ef4444;
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 0; line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        /* Header */
        header { text-align: center; margin-bottom: 60px; }
        h1 { margin: 0; font-weight: 800; font-size: 3rem; letter-spacing: -0.05em; color: #fff; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; font-weight: 400; margin-top: 8px;}
        
        /* Search Bar (Glassmorphism) */
        .search-container {
            display: flex; gap: 12px; width: 100%; max-width: 650px; margin: 0 auto 50px auto;
        }
        .search-container input {
            flex: 1; padding: 18px 24px; border-radius: 999px;
            border: 1px solid var(--border-color);
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            color: white; font-size: 1.05rem; outline: none;
            transition: all 0.3s ease;
        }
        .search-container input:focus {
            border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow);
            background: rgba(24, 24, 27, 0.9);
        }
        .search-container button {
            padding: 0 32px; border-radius: 999px; border: none;
            background: #fff; color: #000; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .search-container button:hover { background: #e4e4e7; transform: scale(1.02); }

        /* Chart Section */
        .chart-section {
            background: var(--bg-card); border-radius: 20px; padding: 30px;
            border: 1px solid var(--border-color);
            display: none; margin-bottom: 50px;
        }
        .chart-section h2 { margin-top: 0; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; font-weight: 600;}
        .chart-container { width: 100%; display: flex; justify-content: center; }

        /* Gallery */
        .section-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;}
        .movie-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        
        /* Modern Cards */
        .movie-card { 
            position: relative; border-radius: 16px; overflow: hidden;
            background: var(--bg-card); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .movie-card:hover { transform: translateY(-8px); border-color: var(--border-color); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);}
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        
        /* Hover Overlay */
        .card-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(9,9,11,0.95) 0%, rgba(9,9,11,0.6) 50%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .movie-card:hover .card-overlay { opacity: 1; }
        
        .movie-info h3 { margin: 0 0 4px 0; font-size: 1.1rem; font-weight: 600; color: #fff; line-height: 1.3;}
        .movie-info p { margin: 0 0 16px 0; font-size: 0.9rem; color: #eab308; font-weight: 500; display: flex; align-items: center; gap: 4px;}
        
        /* Buttons inside Card */
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-action {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); backdrop-filter: blur(5px);
            color: #fff; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
        }
        .btn-action:hover { background: rgba(255,255,255,0.15); }
        .btn-action.full { grid-column: span 2; background: var(--accent); border: none; }
        .btn-action.full:hover { background: #2563eb; }

        /* Main Buttons */
        .btn-main {
            padding: 12px 30px; font-size: 1rem; background: var(--bg-card); color: white;
            border: 1px solid var(--border-color); border-radius: 999px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .btn-main:hover { background: rgba(255,255,255,0.05); }

        /* Modal styling */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-card); border-radius: 24px;
            width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto;
            padding: 40px; position: relative; border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px) scale(0.98); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }
        .modal-close {
            position: absolute; top: 24px; right: 24px;
            background: rgba(255,255,255,0.05); border: none; border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        #modal-title { margin-top: 0; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1); border-left-color: var(--accent);
            border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Sentiment Bar */
        .sentiment-bar { width: 100%; height: 12px; background: var(--danger); border-radius: 999px; overflow: hidden; display: flex; margin: 15px 0; }
        .sentiment-positive { background: var(--success); height: 100%; }
        
        /* Keywords Highlight */
        .keyword-container { margin: 20px 0; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color);}
        .keyword-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .keyword-label { font-size: 0.85rem; color: var(--text-muted); min-width: 80px; }
        .keyword-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 999px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px;}
        .keyword-badge.pos { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .keyword-badge.neg { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        /* Review Item */
        .review-item {
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px;
            margin-bottom: 15px; border: 1px solid var(--border-color);
        }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; align-items: center; }
        .review-author { font-weight: 600; color: #fff;}
        .review-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 999px; background: #27272a; display: inline-flex; align-items: center; gap: 4px; font-weight: 500;}
        .review-badge.Positive { color: #34d399; background: rgba(16, 185, 129, 0.1); }
        .review-badge.Negative { color: #f87171; background: rgba(239, 68, 68, 0.1); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MRMP Explorer</h1>
            <p class="subtitle">Reference Movie Recommendation Platform</p>
        </header>

        <div class="top-section">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search Movie (example: Interstellar)..." onkeypress="handleKeyPress(event)">
                <button onclick="searchMovies()">
                    <i data-lucide="search" style="width: 18px; height: 18px;"></i> Search
                </button>
            </div>

            <div class="chart-section" id="chart-section">
                <h2><i data-lucide="bar-chart-2"></i> Popularity Rating Analysis</h2>
                <div class="loader" id="chart-loader"></div>
                <div class="chart-container">
                    <canvas id="ratingChart"></canvas>
                </div>
            </div>
        </div>

        <h2 class="section-title" id="gallery-title">
            <i data-lucide="trending-up"></i> Trending Now
        </h2>
        <div class="loader hidden" id="gallery-loader"></div>
        <div class="movie-gallery" id="movie-gallery"></div>
        
        <div style="text-align: center; margin-top: 40px; margin-bottom: 30px;">
            <button id="load-more-btn" class="btn-main hidden" onclick="loadMore()">
                <i data-lucide="chevron-down"></i> Load More
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
            <h2 id="modal-title">Judul Modal</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/static/js/main.js" defer></script>
    <script>
        // Inisialisasi ikon awal
        lucide.createIcons();
    </script>
</body>
</html>
